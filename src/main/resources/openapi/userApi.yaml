openapi: 3.0.3
info:
  title: User Management API
  version: "2.0.0"
security:
  - bearerAuth: []
paths:
  /users:
    post:
      tags:
        - User
      operationId: createUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUserRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserDto'
        '401':
          description: Unauthorized
    get:
      tags:
        - User
      operationId: getUser
      parameters:
        - name: id
          in: query
          required: false
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/UserDto'
        '401':
          description: Unauthorized
    put:
      tags:
        - User
      operationId: updateUser
      parameters:
        - name: id
          in: query
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUserRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserDto'
        '401':
          description: Unauthorized
  /users/{id}/identity-links:
    post:
      tags:
        - IdentityLink
      operationId: createIdentityLink
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateIdentityLinkRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IdentityLinkDto'
        '401':
          description: Unauthorized
    get:
      tags:
        - IdentityLink
      operationId: getIdentityLinksByUser
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/IdentityLinkDto'
        '401':
          description: Unauthorized
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    UserStatus:
      type: string
      enum:
        - ACTIVE
        - INACTIVE
        - SUSPENDED
    CreateUserRequest:
      type: object
      properties:
        userName:
          type: string
        email:
          type: string
          format: email
        status:
          $ref: '#/components/schemas/UserStatus'
      required:
        - userName
        - email
    UpdateUserRequest:
      type: object
      properties:
        userName:
          type: string
        email:
          type: string
          format: email
        status:
          $ref: '#/components/schemas/UserStatus'
      required:
        - userName
        - email
    UserDto:
      type: object
      properties:
        id:
          type: integer
          format: int64
        userName:
          type: string
        email:
          type: string
          format: email
        status:
          $ref: '#/components/schemas/UserStatus'
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - userName
        - email
        - status
    CreateIdentityLinkRequest:
      type: object
      properties:
        issuer:
          type: string
        subject:
          type: string
        provider:
          type: string
      required:
        - issuer
        - subject
        - provider
    IdentityLinkDto:
      type: object
      properties:
        id:
          type: integer
          format: int64
        userId:
          type: integer
          format: int64
        issuer:
          type: string
        subject:
          type: string
        provider:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - userId
        - issuer
        - subject
        - provider
