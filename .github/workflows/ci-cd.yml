name: CI/CD Pipeline

on:
  pull_request:
    branches:
      - develop
      - master
  push:
    branches:
      - develop
      - master

concurrency:
  group: ci-cd-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  code_quality:
    name: Code Quality
    runs-on: self-hosted
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Compile and quality checks
        run: mvn --batch-mode --no-transfer-progress clean verify -DskipTests

  unit_tests:
    name: Unit Tests
    runs-on: self-hosted
    needs: code_quality
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Run tests
        run: mvn --batch-mode --no-transfer-progress test

  qodana:
    name: Qodana Scan
    needs: code_quality
    uses: ./.github/workflows/qodana_code_quality.yml
    permissions:
      contents: read
      checks: write
      pull-requests: write
    secrets:
      QODANA_TOKEN: ${{ secrets.QODANA_TOKEN }}

  dependency_submission:
    name: Dependency Submission
    runs-on: self-hosted
    if: ${{ github.event_name == 'push' }}
    needs: code_quality
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Submit dependency graph
        uses: advanced-security/maven-dependency-submission-action@v5

  docker:
    name: Build and Push Docker Image
    runs-on: self-hosted
    needs:
      - unit_tests
      - qodana
    if: ${{ github.event_name == 'push' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Build application jar
        run: mvn --batch-mode --no-transfer-progress clean package -DskipTests

      - name: Extract Maven project version
        id: app_version
        run: |
          set -euo pipefail
          APP_VERSION="$(mvn -q -DforceStdout help:evaluate -Dexpression=project.version)"
          echo "version=${APP_VERSION}" >> "${GITHUB_OUTPUT}"
          echo "Resolved Maven version: ${APP_VERSION}"

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        env:
          IMAGE_NAME: victodomvar/userauth
          APP_VERSION: ${{ steps.app_version.outputs.version }}
        run: |
          set -euo pipefail
          docker build -f dockerfile \
            -t ${IMAGE_NAME}:${APP_VERSION} \
            -t ${IMAGE_NAME}:${{ github.sha }} \
            -t ${IMAGE_NAME}:latest \
            .
          docker push ${IMAGE_NAME}:${APP_VERSION}
          docker push ${IMAGE_NAME}:${{ github.sha }}
          docker push ${IMAGE_NAME}:latest

  deploy:
    name: Deploy to Kubernetes
    needs:
      - docker
    if: ${{ github.event_name == 'push' }}
    uses: ./.github/workflows/deploy-k8s.yml
    with:
      namespace: energyco
      image_version: ${{ github.sha }}
