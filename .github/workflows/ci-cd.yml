name: CI/CD Pipeline

on:
  pull_request:
    branches:
      - develop
      - master
  push:
    branches:
      - develop
      - master

permissions:
  contents: read

jobs:
  code_quality:
    name: Code Quality
    runs-on: self-hosted
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Verify code quality gates
        run: mvn verify -DskipTests --no-transfer-progress

  qodana:
    name: Qodana Scan
    needs: code_quality
    uses: ./.github/workflows/qodana_code_quality.yml
    secrets:
      QODANA_TOKEN: ${{ secrets.QODANA_TOKEN }}

  test:
    name: Tests
    runs-on: self-hosted
    needs:
      - code_quality
      - qodana
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Run tests
        run: mvn clean verify --no-transfer-progress

  docker:
    name: Build and Push Docker Image
    runs-on: self-hosted
    needs: test
    if: ${{ github.event_name == 'push' && (github.ref_name == 'develop' || github.ref_name == 'master') }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Build application jar
        run: mvn clean package -DskipTests --no-transfer-progress

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        run: |
          set -euo pipefail
          docker build -t victodomvar/userauth:${{ github.sha }} -t victodomvar/userauth:latest .
          docker push victodomvar/userauth:${{ github.sha }}
          docker push victodomvar/userauth:latest

  deploy:
    name: Deploy to Kubernetes
    needs:
      - test
      - docker
    if: ${{ github.event_name == 'push' && (github.ref_name == 'develop' || github.ref_name == 'master') }}
    uses: ./.github/workflows/deploy-k8s.yml
    with:
      image_version: ${{ github.sha }}
    secrets:
      KUBE_CONFIG: ${{ secrets.KUBE_CONFIG }}
