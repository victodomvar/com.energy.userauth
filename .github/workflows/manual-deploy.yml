name: Manual Deploy/Rollback

on:
  workflow_dispatch:
    inputs:
      namespace:
        description: Kubernetes namespace
        required: true
        default: energyco
        type: string
      image_version:
        description: Docker image tag to deploy (latest, SHA, or Maven version)
        required: true
        default: latest
        type: string

concurrency:
  group: manual-deploy-${{ inputs.namespace }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    uses: ./.github/workflows/deploy-k8s.yml
    with:
      namespace: ${{ inputs.namespace }}
      image_version: ${{ inputs.image_version }}
