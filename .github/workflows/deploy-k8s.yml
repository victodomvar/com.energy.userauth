name: Deploy to Kubernetes

on:
  workflow_dispatch:
    inputs:
      image_version:
        description: Docker image tag to deploy
        required: true
        type: string
      namespace:
        description: Kubernetes namespace
        required: true
        default: energyco
        type: string
  workflow_call:
    inputs:
      image_version:
        required: true
        type: string
      namespace:
        required: false
        default: energyco
        type: string

permissions:
  contents: read

jobs:
  deploy:
    runs-on: self-hosted
    env:
      NAMESPACE: ${{ inputs.namespace }}
      IMAGE_NAME: victodomvar/userauth
      IMAGE_TAG: ${{ inputs.image_version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: v1.32.0

      - name: Deploy to Minikube
        run: |
          set -euo pipefail

          kubectl config use-context minikube
          kubectl cluster-info

          kubectl get namespace "${NAMESPACE}" >/dev/null 2>&1 || kubectl create namespace "${NAMESPACE}"

          # Database resources first
          kubectl apply -f k8s/db/volume/pv.yaml
          kubectl apply -n "${NAMESPACE}" -f k8s/db/volume/pvc.yaml
          kubectl apply -n "${NAMESPACE}" -f k8s/db/userauthdb-service.yaml
          kubectl apply -n "${NAMESPACE}" -f k8s/db/userauthdb-deployment.yaml
          kubectl rollout status deployment/userauthdb-deployment -n "${NAMESPACE}" --timeout=300s

          # Application resources second
          kubectl apply -n "${NAMESPACE}" -f k8s/deployment/userauth-service.yaml
          kubectl apply -n "${NAMESPACE}" -f k8s/deployment/userauth-deployment.yaml
          kubectl set image deployment/userauth-deployment userauth=${IMAGE_NAME}:${IMAGE_TAG} -n "${NAMESPACE}"
          kubectl rollout status deployment/userauth-deployment -n "${NAMESPACE}" --timeout=300s
