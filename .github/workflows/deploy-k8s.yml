name: Deploy to Kubernetes

on:
  workflow_dispatch:
    inputs:
      image_version:
        description: Docker image tag to set on deployment (optional)
        required: false
        default: latest
        type: string
      namespace:
        description: Kubernetes namespace
        required: true
        default: energyco
        type: string
  workflow_call:
    inputs:
      image_version:
        required: true
        type: string
      namespace:
        required: false
        type: string
        default: energyco
    secrets:
      KUBE_CONFIG:
        required: true

permissions:
  contents: read

concurrency:
  group: deploy-k8s-${{ github.ref_name }}-${{ inputs.namespace }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy manifests
    runs-on: self-hosted
    env:
      NAMESPACE: ${{ inputs.namespace }}
      IMAGE_NAME: victodomvar/userauth
      DEPLOYMENT_NAME: userauth
      CONTAINER_NAME: userauth
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: v1.32.0

      - name: Configure kubeconfig
        run: |
          set -euo pipefail
          mkdir -p ~/.kube
          printf '%s' "${{ secrets.KUBE_CONFIG }}" > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Ensure namespace exists
        run: |
          set -euo pipefail
          kubectl create namespace "${NAMESPACE}" --dry-run=client -o yaml | kubectl apply -f -

      - name: Apply Kubernetes manifests
        run: |
          set -euo pipefail
          kubectl apply -n "${NAMESPACE}" -f k8s/

      - name: Update deployment image
        run: |
          set -euo pipefail
          kubectl set image deployment/${DEPLOYMENT_NAME} ${CONTAINER_NAME}=${IMAGE_NAME}:${{ inputs.image_version }} -n "${NAMESPACE}"
          kubectl rollout status deployment/${DEPLOYMENT_NAME} -n "${NAMESPACE}"
