name: Deploy to Kubernetes

on:
  workflow_dispatch:
    inputs:
      image_version:
        description: Docker image tag to deploy
        required: true
        type: string
      namespace:
        description: Kubernetes namespace
        required: true
        default: energyco
        type: string
  workflow_call:
    inputs:
      image_version:
        required: true
        type: string
      namespace:
        required: false
        default: energyco
        type: string

permissions:
  contents: read

concurrency:
  group: deploy-k8s-${{ github.ref_name }}-${{ inputs.namespace }}
  cancel-in-progress: false

env:
  IMAGE_NAME: victodomvar/userauth
  DEPLOYMENT_NAME: userauth
  CONTAINER_NAME: userauth

jobs:
  deploy:
    runs-on: self-hosted
    env:
      NAMESPACE: ${{ inputs.namespace }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: v1.32.0

      - name: Debug runner and kubeconfig
        run: |
          set -euo pipefail
          echo "whoami: $(whoami)"
          echo "HOME: ${HOME}"
          echo "KUBECONFIG: ${KUBECONFIG:-<not set>}"
          if [ -f "${HOME}/.kube/config" ]; then
            echo "~/.kube/config exists"
          else
            echo "~/.kube/config missing"
          fi
          kubectl config get-contexts -o name || true

      - name: Select Kubernetes context
        run: |
          set -euo pipefail
          CONTEXT="${KUBE_CONTEXT:-}"
          if [ -z "${CONTEXT}" ]; then
            CONTEXT="$(kubectl config current-context 2>/dev/null || true)"
          fi
          if [ -z "${CONTEXT}" ]; then
            CONTEXT="$(kubectl config get-contexts -o name | head -n1 || true)"
          fi
          if [ -z "${CONTEXT}" ]; then
            echo "No Kubernetes context available for this runner user." >&2
            exit 1
          fi
          kubectl config use-context "${CONTEXT}"
          echo "KUBE_CONTEXT_SELECTED=${CONTEXT}" >> "${GITHUB_ENV}"
          echo "Using context: ${CONTEXT}"

      - name: Verify cluster connectivity
        run: |
          set -euo pipefail
          kubectl --context "${KUBE_CONTEXT_SELECTED}" cluster-info

      - name: Ensure namespace exists
        run: |
          set -euo pipefail
          kubectl --context "${KUBE_CONTEXT_SELECTED}" get namespace "${NAMESPACE}" >/dev/null 2>&1 || kubectl --context "${KUBE_CONTEXT_SELECTED}" create namespace "${NAMESPACE}"

      - name: Apply Kubernetes manifests
        run: |
          set -euo pipefail
          kubectl --context "${KUBE_CONTEXT_SELECTED}" apply -n "${NAMESPACE}" -f k8s/

      - name: Update deployment image
        run: |
          set -euo pipefail
          kubectl --context "${KUBE_CONTEXT_SELECTED}" set image deployment/${DEPLOYMENT_NAME} ${CONTAINER_NAME}=${IMAGE_NAME}:${{ inputs.image_version }} -n "${NAMESPACE}"
          kubectl --context "${KUBE_CONTEXT_SELECTED}" rollout status deployment/${DEPLOYMENT_NAME} -n "${NAMESPACE}"
