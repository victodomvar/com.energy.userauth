name: Deploy to Kubernetes

on:
  workflow_dispatch:
    inputs:
      image_version:
        description: Docker image tag to deploy
        required: true
        type: string
      namespace:
        description: Kubernetes namespace
        required: true
        default: energyco
        type: string
  workflow_call:
    inputs:
      image_version:
        required: true
        type: string
      namespace:
        required: false
        default: energyco
        type: string

permissions:
  contents: read

concurrency:
  group: deploy-k8s-${{ github.ref_name }}-${{ inputs.namespace }}
  cancel-in-progress: false

env:
  IMAGE_NAME: victodomvar/userauth
  DEPLOYMENT_NAME: userauth
  CONTAINER_NAME: userauth

jobs:
  deploy:
    runs-on: self-hosted
    env:
      NAMESPACE: ${{ inputs.namespace }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: v1.32.0

      - name: Use minikube context
        run: |
          set -euo pipefail
          kubectl config use-context minikube
          kubectl cluster-info

      - name: Ensure namespace exists
        run: |
          set -euo pipefail
          kubectl get namespace "${NAMESPACE}" >/dev/null 2>&1 || kubectl create namespace "${NAMESPACE}"

      - name: Apply Kubernetes manifests
        run: |
          set -euo pipefail
          kubectl apply -n "${NAMESPACE}" -f k8s/

      - name: Update deployment image
        run: |
          set -euo pipefail
          kubectl set image deployment/${DEPLOYMENT_NAME} ${CONTAINER_NAME}=${IMAGE_NAME}:${{ inputs.image_version }} -n "${NAMESPACE}"
          kubectl rollout status deployment/${DEPLOYMENT_NAME} -n "${NAMESPACE}"
