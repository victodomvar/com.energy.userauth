apiVersion: apps/v1
kind: Deployment
metadata:
  name: userauth-deployment
  namespace: energyco
spec:
  replicas: 1
  selector:
    matchLabels:
      app: userauth
  template:
    metadata:
      labels:
        app: userauth
    spec:
      containers:
        - name: userauth
          image: victodomvar/userauth:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: userauth-config
          env:
            - name: SPRING_DATASOURCE_URL
              value: "jdbc:postgresql://$(DB_HOST):$(DB_PORT)/userauthdb"
            - name: LOGGING_LEVEL_ROOT
              value: "$(LOG_LEVEL)"
            - name: SPRING_DATASOURCE_USERNAME
              value: "userauthuser"
            - name: SPRING_DATASOURCE_PASSWORD
              value: "userauthpassword"
